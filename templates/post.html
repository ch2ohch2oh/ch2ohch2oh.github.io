{% extends "base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<article>
    <header>
        <h1>{{ post.title }}</h1>
        <time>{{ post.date.strftime('%Y-%m-%d') if post.date.strftime is defined else post.date }}</time>
    </header>
    <div class="content">
        {{ post.content | safe }}
    </div>
    <footer>
        <a href="index.html">&larr; Back to Home</a>
    </footer>
</article>
{% endblock %}
